services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: spacestudyship
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '\\\\'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: 'redis:7-alpine'
    command: redis-server --requirepass '\\\\'
    ports:
      - '6379:6379'

volumes:
  postgres_data:
